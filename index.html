<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Família EPC - Catálogo de músicas cifradas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <section id="menuSection" class="menu-section">
      <div class="menu-actions-wrap">
        <button id="menuToggleBtn" class="menu-toggle" type="button" aria-label="Abrir menu" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="menu-actions hidden" id="menuActions">
          <button id="openEditorMenuBtn">Editor</button>
          <button id="openRepertoireMenuBtn">Catálogo</button>
        </div>
      </div>
    </section>

    <section id="editorSection" class="hidden">
      <div class="editor-container">
        <div class="editor-toolbar">
          <button id="backToMenuFromEditor" aria-label="Voltar ao menu">&larr;</button>
          <button class="load-btn icon-btn" id="carregarJSONBtn" type="button" aria-label="Carregar música" title="Carregar música">&#8981;</button>
          <button class="delete-btn icon-btn" id="deleteSongBtn" type="button" aria-label="Excluir música" title="Excluir música">&times;</button>
          <button class="preview-btn icon-btn" id="previewBtn" type="button" aria-label="Pré-visualização" title="Pré-visualização">&#9720;</button>
          <button class="editor-clear-btn icon-btn" id="clearEditorBtn" type="button" aria-label="Limpar campos" title="Limpar campos">&#8634;</button>
          <button class="transpose-btn icon-btn" id="transposeEditorDownBtn" type="button" aria-label="Diminuir meio tom" title="Diminuir meio tom">-&#189;</button>
          <button class="transpose-btn icon-btn" id="transposeEditorUpBtn" type="button" aria-label="Aumentar meio tom" title="Aumentar meio tom">+&#189;</button>
          <button class="json-btn icon-btn" id="salvarJSONBtn" type="button" aria-label="Salvar" title="Salvar">&#10003;</button>
        </div>

        <div class="top-area">
          <div class="input-group">
            <label>Título da Música</label>
            <input id="musicaTitulo" type="text" placeholder="Digite o título da música aqui" />
          </div>
          <div class="input-group">
            <label>Tags</label>
            <input id="musicaTags" type="text" placeholder="Ex: MISSA, ADORAÇÃO, COMUNHÃO, LOUVOR" />
          </div>
        </div>

        <div class="editor-grid">
          <div class="input-group">
            <label>Cole a cifra Abaixo</label>
            <textarea id="inputText" placeholder="Cole aqui..."></textarea>
          </div>

          <div class="input-group">
            <label>Texto em formato ChordPro</label>
            <textarea id="outputChordPro"></textarea>
          </div>
        </div>
      </div>
    </section>

    <div class="preview-modal hidden" id="previewModal" onclick="fecharPreview(event)">
      <div class="phone-frame" onclick="event.stopPropagation()">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <div class="preview-header">
            <div class="preview-title">Pré-visualização</div>
            <button class="close-preview" onclick="togglePreview()">Fechar</button>
          </div>
          <div class="preview-scroll">
            <div id="previewMusica" class="preview-cifra"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="search-modal hidden" id="searchModal" onclick="fecharSearchModal(event)">
      <div class="search-dialog" onclick="event.stopPropagation()">
        <div class="search-dialog-header">
          <strong>Buscar música</strong>
          <button id="closeSearchModalBtn">Fechar</button>
        </div>
        <div class="search-dialog-body">
          <label for="songSearchInput">Título ou tags</label>
          <div class="search-input-wrap">
            <input id="songSearchInput" type="text" autocomplete="off" placeholder="Digite para buscar..." />
            <button id="clearSongSearchBtn" class="clear-search-btn" type="button" aria-label="Limpar busca">X</button>
          </div>
          <div id="songSearchSuggestions" class="search-suggestions hidden"></div>
        </div>
      </div>
    </div>

    <section id="repertoireSection" class="hidden">
      <div class="player-layout">
        <aside class="song-list-panel">
          <div class="repertoire-title-row">
            <div class="player-toolbar">
              <button id="backToMenuFromRepertoire" aria-label="Voltar ao menu">&larr;</button>
              <button id="refreshRepertoireListBtn" aria-label="Atualizar lista" title="Atualizar lista">&#8635;</button>
            </div>
            <h3>Repertórios/Visualização</h3>
          </div>
          <div class="repertoire-builder">
            <div class="repertoire-music-search-wrap">
              <input id="repertoireCatalogSearchInput" class="catalog-search" type="text" autocomplete="off" placeholder="Buscar música por título ou tag..." />
              <button id="clearRepertoireCatalogSearchBtn" class="clear-search-btn" type="button" aria-label="Limpar busca de música">X</button>
            </div>
            <div class="repertoire-search-wrap">
              <input id="catalogMomentInput" class="catalog-search" type="text" autocomplete="off" placeholder="Repertório..." />
              <button id="clearCatalogMomentBtn" class="clear-repertoire-search" type="button" aria-label="Limpar busca de repertório">X</button>
              <div id="repertoireLibrary" class="repertoire-library"></div>
            </div>
          </div>
          <ul id="repertoireSongList" class="song-list"></ul>
          <div id="repertoireList" class="repertoire-list"></div>
        </aside>
      </div>
    </section>

    <div id="fullscreenOverlay" class="fullscreen-overlay hidden" role="dialog" aria-modal="true">
      <div class="viewer-controls fullscreen-controls">
        <button id="closeFullscreenBtn" aria-label="Voltar">&larr;</button>
        <button id="fullscreenPrevSongBtn" class="hidden" aria-label="Música anterior" title="Música anterior">&#8249;</button>
        <button id="fullscreenNextSongBtn" class="hidden" aria-label="Próxima música" title="Próxima música">&#8250;</button>
        <button id="fullscreenTransposeDownBtn" aria-label="Diminuir meio tom" title="Diminuir meio tom">-&#189;</button>
        <button id="fullscreenTransposeUpBtn" aria-label="Aumentar meio tom" title="Aumentar meio tom">+&#189;</button>
        <button id="fullscreenToggleThemeBtn" aria-label="Alternar tema" title="Alternar tema">&#9680;</button>
        <button id="fullscreenToggleScrollBtn" aria-label="Iniciar rolagem" title="Iniciar rolagem">&#9654;</button>
        <label class="speed-label" for="fullscreenScrollSpeed" title="Velocidade da rolagem">&#8597;</label>
        <input id="fullscreenScrollSpeed" type="range" min="1" max="100" value="25" />
      </div>
      <div class="fullscreen-header">
        <strong id="fullscreenTitle">Visualização em tela inteira</strong>
      </div>
      <pre id="fullscreenViewerText" class="viewer-text"></pre>
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
